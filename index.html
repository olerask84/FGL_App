<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8" />
    <title>Funder Golf League (FGL)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a3d62" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/icons/FGL_192.png" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="course-selector.css">
</head>
<body>
<div id="app">

    <!-- TOPMENU -->
    <header class="topbar">
        <button id="menuBtn" class="btn primary icon-only" aria-label="Menu" title="Menu">☰</button>
        <button id="addPlayerBtn" class="btn primary" aria-label="Start runde">Start runde</button>
        <button id="endRoundBtn" class="btn primary hidden end-round-btn" aria-label="Afslut runde">Afslut runde</button>
        <button id="resetBtn" class="btn danger hidden" aria-label="Nulstil app">Reset</button>
        <span id="currentCourseLabel"></span>
    </header>

    <!-- SPILLERFANER -->
    <nav id="tabs" class="tabs" aria-label="Spillere (faner)"></nav>

    <!-- PANELER (her vises Bøder / Score) -->
    <main id="tabPanels" class="tab-panels"></main>

</div>

<!-- DIVERSE OVERLAYS (ubrørt, identisk med dine eksisterende) -->
<div id="confirmOverlay" class="overlay hidden">
    <div class="dialog" role="dialog" aria-modal="true">
        <h3>Nulstil app?</h3>
        <p>Er du sikker på, at du vil nulstille app’en?</p>
        <div class="actions">
            <button id="confirmYes" class="btn danger">Ja</button>
            <button id="confirmNo" class="btn">Nej</button>
        </div>
    </div>
</div>

<div id="pickerOverlay" class="overlay hidden">
    <div class="dialog" role="dialog" aria-modal="true">
        <h3>Vælg spillere</h3>
        <div id="pickerList" class="picker-list"></div>
        <div class="actions">
            <button id="pickerConfirm" class="btn primary" disabled>OK</button>
            <button id="pickerClose" class="btn">Annuller</button>
        </div>
    </div>
</div>

<div id="endRoundOverlay" class="overlay hidden">
    <div class="dialog">
        <h3>Afslut runde?</h3>
        <p id="endRoundMessage">Vil du afslutte runden og indsende data?</p>
        <div class="actions">
            <button id="endRoundConfirmYes" class="btn primary">Ja</button>
            <button id="endRoundConfirmNo" class="btn">Nej</button>
        </div>
    </div>
</div>

<div id="courseNameOverlay" class="overlay hidden">
    <div class="dialog">
        <h3>Indtast bane</h3>
        <input id="courseNameInput" type="text" placeholder="Bane-navn...">
        <div class="actions">
            <button id="courseNameOk" class="btn primary">OK</button>
            <button id="courseNameCancel" class="btn">Annuller</button>
        </div>
    </div>
</div>

<div id="menuOverlay" class="overlay hidden">
    <div class="dialog">
        
        <div class="menu-head">
        <h3>Menu</h3>

            <div class="menu-actions">
                <button id="menuUpdateAll" class="btn primary">
                Opdater ALT
                </button>

                <button id="menuClose" class="btn primary">
                Luk
                </button>
            </div>
        </div>

        <div id="menuList" class="menu-list"></div>
    </div>
</div>

<!-- Sheet viewer (uændret) -->
<div id="sheetViewer" class="sheet-viewer hidden">
    <div class="sheet-viewer-header">
        <button id="sheetBack" class="back-btn">←</button>
        <h3 id="sheetViewerTitle" class="sheet-viewer-title"></h3>
    </div>
    <div id="sheetViewerContent" class="sheet-viewer-content"></div>
</div>

<!-- Lodtrækning (uændret) -->
<div id="lotteryPickerOverlay" class="overlay hidden">
    <div class="dialog">
        <h3>Vælg spillere til lodtrækning</h3>
        <div id="lotteryPickerList" class="picker-list"></div>
        <div class="actions">
            <button id="lotteryPickerConfirm" class="btn primary" disabled>OK</button>
            <button id="lotteryPickerClose" class="btn">Annuller</button>
        </div>
    </div>
</div>

<div id="lotteryResultOverlay" class="overlay hidden">
    <div class="dialog">
        <h3>Resultat af lodtrækning</h3>
        <div id="lotteryResultContent" class="lottery-result-content"></div>
        <div class="actions">
            <button id="lotteryResultClose" class="btn primary">OK</button>
        </div>
    </div>
</div>

<!-- ── Banevalg-overlay ────────────────────────────────────── -->
<div id="courseSelectorOverlay" class="overlay hidden">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="csTitle">
    <div class="menu-head">
      <h3 id="csTitle">Vælg golfbane</h3>
      <button id="courseSelectorClose" class="btn">Luk</button>
    </div>

    <!-- Trin 1: Søg på klubnavn -->
    <div class="cs-search-wrap">
      <label for="courseSearchInput">Søg på klubnavn</label>
      <input id="courseSearchInput" type="search"
        placeholder="Søg på klubnavn…"
        autocomplete="off" inputmode="search">
    </div>
    <ul id="courseSearchResults" role="listbox" aria-label="Søgeresultater"></ul>

    <!-- Trin 2: Vælg bane (kun hvis klubben har flere) -->
    <div id="csBaneWrapper" class="hidden">
      <label for="baneSelect">Vælg bane</label>
      <select id="baneSelect">
        <option value="">– Vælg bane –</option>
      </select>
    </div>

    <!-- Trin 3: Vælg teested (kun hvis banen har flere) -->
    <div id="teeSelectWrapper" class="hidden">
      <label for="teeSelect">Vælg teested</label>
      <select id="teeSelect">
        <option value="">– Vælg teested –</option>
      </select>
    </div>

    <!-- Bekræft -->
    <div class="actions">
      <button id="courseSelectorConfirm" class="btn primary" disabled>Bekræft bane</button>
    </div>

    <!-- Manuel indtastning -->
    <div id="csManualWrapper" class="hidden">
      <div class="cs-manual-divider">Klubben findes ikke i listen – indtast manuelt</div>
      <div class="cs-manual-fields">
        <div class="cs-manual-row">
          <label for="csManualName">Klubnavn</label>
          <input id="csManualName" type="text" placeholder="F.eks. Funder Bakker Golf">
        </div>
        <div class="cs-manual-row">
          <label for="csManualPar">Par (total)</label>
          <input id="csManualPar" type="number" value="72" min="60" max="80" style="width:5rem">
        </div>
      </div>
      <div class="actions">
        <button id="csManualConfirm" class="btn primary">Brug denne bane</button>
      </div>
    </div>
  </div>
</div>
<!-- Din app -->
<script src="app.js"></script>
<script src="course-selector.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js', { scope: './' })
    .catch(err => console.error('SW registration failed:', err));
}
</script>


</body>
</html>
